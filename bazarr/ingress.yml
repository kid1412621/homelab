apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress
  labels:
    app: bazarr
  annotations:
    spec.ingressClassName: "traefik"
    traefik.ingress.kubernetes.io/router.entrypoints: "web,websecure"
spec:
  #tls:
  #  - hosts:
  #      - bazarr.nuc.lan
  #    secretName: bazarr-tls
  rules:
    - host: bazarr.nuc.lan
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: service
                port:
                  number: 6767
    - host: bazarr.nanova.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: service
                port:
                  number: 6767
